[/Script/UnrealEd.EditorPerProjectUserSettings]
; WhyBuddy — UE5 编辑器 FBX 导入默认设置
; 本文件配置编辑器级别的 FBX 导入偏好，确保团队成员使用统一的导入参数

[/Script/UnrealEd.FbxImportUI]
; 静态网格体导入（非骨骼网格体）
bImportAsSkeletal=False
bImportMesh=True
bImportAnimations=False

; 材质与贴图
bImportMaterials=True
bImportTextures=True
bResetToFbxOnMaterialConflict=True

; 自动生成碰撞体
bAutoGenerateCollision=True

; 合并同一文件中的多个网格
bCombineMeshes=True

; 法线导入方式：保留原始法线
NormalImportMethod=FBXNIM_ImportNormals
NormalGenerationMethod=MikkTSpace

; 坐标系转换
bConvertScene=True
bConvertSceneUnit=True

; 缩放设置
; 如果模型已在 Blender 中缩放 100 倍，此处设为 1.0
; 如果直接导入未缩放的 GLTF/FBX，此处设为 100.0
ImportUniformScale=1.0

; 变换
ImportTranslation=(X=0.0,Y=0.0,Z=0.0)
ImportRotation=(Pitch=0.0,Yaw=0.0,Roll=0.0)

[/Script/UnrealEd.FbxStaticMeshImportData]
; 静态网格体专用设置
bRemoveDegenerates=True
bBuildAdjacencyBuffer=True
bBuildReversedIndexBuffer=True
bGenerateLightmapUVs=True

; Lightmap UV 分辨率
; Kenney 低多边形模型使用较低分辨率即可
MinLightmapResolution=64
SrcLightmapIndex=0
DstLightmapIndex=1

; 顶点色导入（Kenney 模型使用顶点色）
VertexColorImportOption=Replace
VertexOverrideColor=(R=0,G=0,B=0,A=255)

[/Script/UnrealEd.FbxMeshImportData]
; 网格通用设置
bTransformVertexToAbsolute=True
bBakePivotInVertex=False

[/Script/UnrealEd.EditorLoadingSavingSettings]
; 自动导入设置
bAutoCreateAssets=True
bAutoDeleteAssets=False
bDetectChangesOnStartup=True

; 监控导入目录（可选：将 FBX 文件放入此目录自动触发导入）
; AutoReimportDirectorySettings 可在编辑器中配置

[/Script/UnrealEd.ContentBrowserSettings]
; Content Browser 默认显示设置
; 导入后资产默认存放在 Content/CubePets/Environment/Office/Meshes/
NumObjectsToLoadBeforeWarning=250
