  <rect class="bg" width="1800" height="1280"/>

  <rect x="60" y="36" width="1680" height="216" rx="28" fill="url(#hero)"/>
  <text x="100" y="96" class="hero-meta">PROJECT-FIRST ARCHITECTURE · 2026-04-30 · 9 SPECS COMPLETE</text>
  <text x="100" y="150" class="hero-title">WhyBuddy · Project-First 9 Spec 架构图</text>
  <text x="100" y="193" class="hero-subtitle">用户看项目与路线；系统把澄清、Spec、FSD 规划、执行、证据和产物全部沉淀回 Project。</text>
  <text x="100" y="224" class="hero-meta">主链路：Project → Clarification → Spec → Route → Execution → Artifact / Evidence → Replay / Next Spec</text>
  <rect x="1398" y="80" width="278" height="116" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.24)"/>
  <text x="1426" y="120" class="hero-meta">EXECUTION STATUS</text>
  <text x="1426" y="164" class="hero-title">93 / 93</text>
  <text x="1584" y="164" class="hero-subtitle">Done</text>

  <g transform="translate(80 292)">
    <text x="0" y="0" class="section-title">一、产品主对象：Project</text>
    <text x="282" y="0" class="section-note">Project 是首屏、上下文、执行、产物、证据和下一轮演化的聚合根。</text>
  </g>

  <g transform="translate(610 426)">
    <rect width="580" height="330" rx="34" fill="url(#center)" filter="url(#shadow)"/>
    <text x="42" y="66" class="center-title">Project</text>
    <text x="42" y="108" class="center-text">项目级 AI 自动驾驶操作系统的第一层对象</text>
    <text x="42" y="148" class="center-text">统一承载：目标、上下文、规格、路线、任务、证据、产物</text>
    <rect x="42" y="182" width="496" height="1" fill="rgba(255,255,255,0.3)"/>
    <text x="42" y="222" class="center-text">用户入口：创建 / 选择项目 → 当前项目驾驶舱</text>
    <text x="42" y="258" class="center-text">系统入口：projectId 贯穿输入、任务、执行和回放</text>
    <text x="42" y="294" class="center-text">演化入口：执行结果反哺 Spec 与下一轮路线</text>
  </g>

  <g transform="translate(80 330)">
    <rect class="card" width="430" height="140" rx="22"/>
    <rect x="24" y="24" width="86" height="28" rx="14" fill="#14213D"/>
    <text x="44" y="43" class="pill">P0 总纲</text>
    <text x="24" y="76" class="spec-title">1. Product Architecture</text>
    <text x="24" y="101" class="spec-path">project-first-product-architecture</text>
    <text x="24" y="126" class="spec-desc">入口收敛、产品边界、Project-first 主线。</text>
  </g>

  <g transform="translate(80 512)">
    <rect class="card" width="430" height="176" rx="22"/>
    <rect x="24" y="24" width="92" height="28" rx="14" fill="#1B5C73"/>
    <text x="45" y="43" class="pill">P0 底座</text>
    <text x="24" y="76" class="spec-title">2. Project Domain Model</text>
    <text x="24" y="101" class="spec-path">project-domain-model</text>
    <text x="24" y="129" class="spec-desc">定义 Project、Message、Spec、Route、Mission、</text>
    <text x="24" y="151" class="spec-desc">Artifact、Evidence 的领域关系和持久化口径。</text>
  </g>

  <g transform="translate(80 730)">
    <rect class="card" width="430" height="170" rx="22"/>
    <rect x="24" y="24" width="86" height="28" rx="14" fill="#2E7D5F"/>
    <text x="44" y="43" class="pill">P0 首页</text>
    <text x="24" y="76" class="spec-title">3. Project Cockpit Home</text>
    <text x="24" y="101" class="spec-path">project-cockpit-home</text>
    <text x="24" y="129" class="spec-desc">首页只服务当前项目：无项目创建、</text>
    <text x="24" y="151" class="spec-desc">有项目进入驾驶舱，不再堆入口。</text>
  </g>

  <g transform="translate(1290 330)">
    <rect class="card" width="430" height="156" rx="22"/>
    <rect x="24" y="24" width="100" height="28" rx="14" fill="#2F80ED"/>
    <text x="45" y="43" class="pill">P0 输入</text>
    <text x="24" y="76" class="spec-title">4. Project-Scoped Composer</text>
    <text x="24" y="101" class="spec-path">project-scoped-composer</text>
    <text x="24" y="129" class="spec-desc">统一输入框变成当前项目继续推进入口。</text>
  </g>

  <g transform="translate(1290 528)">
    <rect class="card" width="430" height="166" rx="22"/>
    <rect x="24" y="24" width="100" height="28" rx="14" fill="#7C5CC4"/>
    <text x="45" y="43" class="pill">P0 澄清</text>
    <text x="24" y="76" class="spec-title">5. Clarification Conversation</text>
    <text x="24" y="101" class="spec-path">project-clarification-conversation</text>
    <text x="24" y="129" class="spec-desc">补问、选择、确认都进入项目上下文，</text>
    <text x="24" y="151" class="spec-desc">不再丢失为一次性会话。</text>
  </g>

  <g transform="translate(1290 736)">
    <rect class="card" width="430" height="164" rx="22"/>
    <rect x="24" y="24" width="100" height="28" rx="14" fill="#C77D2D"/>
    <text x="45" y="43" class="pill">P0 执行</text>
    <text x="24" y="76" class="spec-title">6. Project Execution Center</text>
    <text x="24" y="101" class="spec-path">project-execution-center</text>
    <text x="24" y="129" class="spec-desc">任务中心按项目聚合执行状态、日志、</text>
    <text x="24" y="151" class="spec-desc">产物与人工接管动作。</text>
  </g>

  <g transform="translate(280 974)">
    <rect class="card" width="370" height="154" rx="22"/>
    <rect x="24" y="24" width="96" height="28" rx="14" fill="#245466"/>
    <text x="45" y="43" class="pill">P1 Spec</text>
    <text x="24" y="76" class="spec-title">7. Project Spec Center</text>
    <text x="24" y="101" class="spec-path">project-spec-center</text>
    <text x="24" y="129" class="spec-desc">版本、来源、diff、完整度、演化记录。</text>
  </g>

  <g transform="translate(715 974)">
    <rect class="card" width="370" height="154" rx="22"/>
    <rect x="24" y="24" width="96" height="28" rx="14" fill="#2F80ED"/>
    <text x="45" y="43" class="pill">P1 Route</text>
    <text x="24" y="76" class="spec-title">8. FSD Route Planner</text>
    <text x="24" y="101" class="spec-path">project-fsd-route-planner</text>
    <text x="24" y="129" class="spec-desc">推荐、快速、深度、保守路线与选择。</text>
  </g>

  <g transform="translate(1150 974)">
    <rect class="card" width="370" height="154" rx="22"/>
    <rect x="24" y="24" width="118" height="28" rx="14" fill="#2E7D5F"/>
    <text x="45" y="43" class="pill">P2 Evidence</text>
    <text x="24" y="76" class="spec-title">9. Evidence Artifact Replay</text>
    <text x="24" y="101" class="spec-path">project-evidence-artifact-replay</text>
    <text x="24" y="129" class="spec-desc">结果、证据、SVG、日志、回放沉淀。</text>
  </g>

