  <g transform="translate(610 792)">
    <rect class="mini-card" width="580" height="82" rx="18" fill="#FFFFFF"/>
    <text x="28" y="34" class="flow-label">闭环流转</text>
    <text x="116" y="34" class="flow-small">需求澄清 → Spec 版本 → FSD 路线 → Mission 执行 → 证据/产物回流 → Spec 更新建议</text>
    <rect x="28" y="52" width="522" height="8" rx="4" fill="#E8EEF5"/>
    <rect x="28" y="52" width="522" height="8" rx="4" fill="#2EB67D"/>
  </g>

  <g transform="translate(80 930)">
    <text x="0" y="0" class="section-title">二、演化层与运行层</text>
    <text x="0" y="28" class="section-note">Spec Center 负责可解释规格；FSD Route Planner 负责路线选择；Evidence Replay 让执行结果反哺下一轮项目演化。</text>
  </g>

  <g transform="translate(80 1166)">
    <rect class="card" width="1640" height="74" rx="22"/>
    <text x="28" y="31" class="footer-title">边界结论</text>
    <text x="152" y="31" class="footer-text">50+ AIGC 节点沉入 FSD 角色内部；Workflow / Docker / Browser / Native Runtime 是执行承载层，不作为首屏产品对象。</text>
    <text x="28" y="56" class="footer-strong">下一验证点：</text>
    <text x="128" y="56" class="footer-text">用一个真实项目样例跑通创建、澄清、Spec、路线、执行、产物和证据回放。</text>
    <text x="1254" y="56" class="footer-text">生成文件：docs/project-first-9-spec-architecture-2026-04-30.svg</text>
