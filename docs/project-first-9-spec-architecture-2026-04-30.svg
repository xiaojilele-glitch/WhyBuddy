      .center-text { font: 600 17px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: rgba(255,255,255,0.88); letter-spacing: 0; }
      .section-title { font: 900 24px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172235; letter-spacing: 0; }
