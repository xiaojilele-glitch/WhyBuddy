      .flow-label { font: 800 15px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #44546A; letter-spacing: 0; }
      .flow-small { font: 650 12px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #69778A; letter-spacing: 0; }
      .domain-title { font: 850 18px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172235; letter-spacing: 0; }
      .domain-item { font: 650 14px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #526074; letter-spacing: 0; }
      .boundary-title { font: 900 19px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172235; letter-spacing: 0; }
      .boundary-text { font: 600 14px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #5B6878; letter-spacing: 0; }
      .footer-title { font: 900 20px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172235; letter-spacing: 0; }
