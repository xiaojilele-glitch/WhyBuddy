      .hero-meta { font: 700 14px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: rgba(255,255,255,0.72); letter-spacing: 0; }
      .card { fill: #FFFFFF; stroke: #E4E9F0; stroke-width: 1; filter: url(#softShadow); }
      .plain-card { fill: #FFFFFF; stroke: #E4E9F0; stroke-width: 1; }
      .summary-label { font: 700 15px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #5B6878; letter-spacing: 0; }
      .summary-value { font: 900 34px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #17324D; letter-spacing: 0; }
      .summary-note { font: 600 13px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #7B8794; letter-spacing: 0; }
      .section-title { font: 900 23px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #17324D; letter-spacing: 0; }
      .section-note { font: 600 14px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #687386; letter-spacing: 0; }
      .lane-label { font: 850 13px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .spec-title { font: 850 19px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #17324D; letter-spacing: 0; }
      .spec-path { font: 700 12px "JetBrains Mono", "Consolas", monospace; fill: #7B8794; letter-spacing: 0; }
      .spec-desc { font: 560 14px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #566274; letter-spacing: 0; }
      .spec-count { font: 900 20px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #17324D; letter-spacing: 0; }
      .spec-percent { font: 750 13px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #687386; letter-spacing: 0; }
      .pill-text { font: 850 12px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .legend { font: 650 13px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #5B6878; letter-spacing: 0; }
      .bar-bg { fill: #E9EEF5; }
      .done { fill: #2EB67D; }
      .progress { fill: #2F80ED; }
      .infra { fill: #0E8B8B; }
      .empty { fill: #A7B0BE; }
      .defer { fill: #7C5CC4; }
      .arrow-line { stroke: #5D6C7D; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .footer-title { font: 900 20px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #17324D; letter-spacing: 0; }
      .footer-text { font: 580 15px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #556174; letter-spacing: 0; }
      .footer-strong { font: 900 15px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #17324D; letter-spacing: 0; }
      .tiny { font: 650 12px "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #778396; letter-spacing: 0; }
