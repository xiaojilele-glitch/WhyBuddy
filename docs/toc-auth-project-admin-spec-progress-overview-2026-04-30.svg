    <rect x="292" y="70" width="240" height="24" rx="12" fill="#FFFFFF" stroke="#2EB67D" stroke-width="1.5"/>
    <text x="308" y="86" class="tiny">Auth Contract Gate：已固定共享合同</text>
    <rect x="564" y="24" width="300" height="42" rx="21" fill="#2D6A6A"/>
    <text x="586" y="51" class="lane-label">Wave 2 - 我的项目归属隔离</text>
    <rect x="886" y="24" width="260" height="42" rx="21" fill="#4E7A51"/>
    <text x="908" y="51" class="lane-label">Wave 3 - 管理员后台入口</text>
    <rect x="1168" y="24" width="230" height="42" rx="21" fill="#7C5CC4"/>
