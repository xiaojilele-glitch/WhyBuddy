    <text x="24" y="101" class="spec-desc">已完成：shared/auth、DB session、auth store、登录页和 /api/auth/*。</text>
    <text x="24" y="124" class="spec-desc">待完成：完整 Redis miss/禁用用户覆盖，以及 web-main 不迁移审核记录。</text>
