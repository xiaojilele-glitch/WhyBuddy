    <text x="24" y="101" class="tiny">MySQL migration 与 Redis health 已验证</text>
  </g>

  <g transform="translate(60 440)">
    <text x="0" y="0" class="section-title">实施主线</text>
    <text x="112" y="0" class="section-note">Wave 0 先固定数据库和 Redis 边界；Wave 1 先落 Auth Contract Gate，再开放 Project/Admin 并行。</text>
    <rect x="0" y="24" width="260" height="42" rx="21" fill="#0E8B8B"/>
