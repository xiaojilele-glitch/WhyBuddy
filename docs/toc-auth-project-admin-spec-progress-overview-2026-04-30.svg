  <rect class="bg" width="1600" height="1260"/>

  <rect x="40" y="30" width="1520" height="220" rx="24" fill="url(#heroGradient)"/>
  <text x="80" y="92" class="hero-meta">TOC AUTH / MYSQL-FIRST / REDIS-OPTIONAL / PROJECT ISOLATION / 2026-04-30</text>
  <text x="80" y="142" class="hero-title">WhyBuddy - ToC 权限规格执行进度总览</text>
  <text x="80" y="183" class="hero-subtitle">先立 MySQL + 可选 Redis 持久化底座，再做 DB-backed 邮箱登录、我的项目隔离、管理员后台和后置运营审计。</text>
  <text x="80" y="214" class="hero-meta">统计口径：5 个 spec，15 份文档，MVP 必做包含 Wave 0 基础设施与前三个权限 spec；配套裁剪版登录架构图已生成。</text>
  <rect x="1170" y="72" width="310" height="128" rx="18" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.24)"/>
  <text x="1194" y="112" class="hero-meta">MVP 任务完成度</text>
  <text x="1194" y="160" class="hero-title">97%</text>
  <text x="1292" y="160" class="hero-subtitle">57 / 59</text>
  <rect x="1194" y="178" width="250" height="8" rx="4" fill="rgba(255,255,255,0.24)"/>
  <rect x="1194" y="178" width="242" height="8" rx="4" fill="#FFFFFF"/>

