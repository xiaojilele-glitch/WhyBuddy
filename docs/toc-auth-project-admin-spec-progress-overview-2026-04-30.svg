  <g transform="translate(60 535)">
    <rect class="card" width="470" height="184" rx="20"/>
    <rect x="24" y="24" width="96" height="28" rx="14" class="done"/>
    <text x="42" y="43" class="pill-text">已完成</text>
    <text x="136" y="44" class="spec-title">0. MySQL Redis Persistence</text>
    <text x="24" y="72" class="spec-path">lightweight-mysql-redis-persistence-strategy</text>
    <text x="24" y="101" class="spec-desc">独立 MySQL 库、可选 Redis、session 可撤销、migration、health check。</text>
    <text x="24" y="124" class="spec-desc">已完成：配置脱敏、migration 幂等、基础表、仓储、health 与 legacy 边界。</text>
    <rect x="24" y="149" width="320" height="10" rx="5" class="bar-bg"/>
    <rect x="24" y="149" width="320" height="10" rx="5" class="done"/>
    <text x="366" y="159" class="spec-count">15 / 15</text>
    <text x="24" y="174" class="spec-percent">100% - MVP Wave 0 - 已完成</text>
  </g>

  <g transform="translate(565 535)">
    <rect class="card" width="470" height="184" rx="20"/>
    <rect x="24" y="24" width="96" height="28" rx="14" class="done"/>
    <text x="42" y="43" class="pill-text">已完成</text>
