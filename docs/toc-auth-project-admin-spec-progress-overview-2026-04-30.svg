    <rect x="24" y="149" width="274" height="10" rx="5" class="progress"/>
    <text x="366" y="159" class="spec-count">12 / 14</text>
    <text x="24" y="174" class="spec-percent">86% - MVP Wave 1 - 登录入口与未登录跳转已完成</text>
  </g>

  <g transform="translate(1070 535)">
    <rect class="card" width="470" height="184" rx="20"/>
    <rect x="24" y="24" width="96" height="28" rx="14" class="done"/>
    <text x="42" y="43" class="pill-text">已完成</text>
    <text x="132" y="44" class="spec-title">2. Personal Project Isolation</text>
    <text x="24" y="72" class="spec-path">personal-project-ownership-and-isolation</text>
    <text x="24" y="101" class="spec-desc">已完成：owner 迁移、项目资源 API、任务创建前 owner 校验与 mission link。</text>
