<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1260" viewBox="0 0 1600 1260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WhyBuddy ToC Auth Project Admin Spec Progress Overview</title>
  <desc id="desc">ToC MySQL Redis persistence, auth contract gate, DB-backed email auth, personal project isolation, admin console, optional admin audit, and trimmed login architecture progress overview.</desc>
  <defs>
    <linearGradient id="heroGradient" x1="40" y1="30" x2="1560" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17324D"/>
      <stop offset="0.46" stop-color="#2D6A6A"/>
      <stop offset="1" stop-color="#4E7A51"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1B2A38" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M2 2 L12 7 L2 12 Z" fill="#5D6C7D"/>
    </marker>
    <style>
      .bg { fill: #F5F7FA; }
