    <text x="28" y="64" class="footer-strong">资源边界：</text>
    <text x="116" y="64" class="footer-text">MySQL 使用独立库 whybuddy；不删除、不清空、不修改 rbac_multitenant；Redis 仅做可选缓存/限流/队列。</text>
    <text x="1008" y="64" class="tiny">总览图：docs/toc-auth-project-admin-spec-progress-overview-2026-04-30.svg</text>
