    <rect x="24" y="149" width="320" height="10" rx="5" class="bar-bg"/>
    <rect x="24" y="149" width="320" height="10" rx="5" class="done"/>
    <text x="366" y="159" class="spec-count">15 / 15</text>
    <text x="24" y="174" class="spec-percent">100% - MVP Wave 3 - 后台壳与只读视图已完成</text>
  </g>

  <g transform="translate(565 760)">
    <rect class="card" width="470" height="184" rx="20"/>
    <rect x="24" y="24" width="86" height="28" rx="14" class="defer"/>
    <text x="43" y="43" class="pill-text">后置</text>
    <text x="132" y="44" class="spec-title">4. Admin Audit And Support</text>
    <text x="24" y="72" class="spec-path">admin-audit-and-support-operations</text>
    <text x="24" y="101" class="spec-desc">禁用用户、归档项目、重跑失败任务、导出 evidence 与审计。</text>
    <text x="24" y="124" class="spec-desc">仅当后台需要真实运营动作时实施，不阻塞 ToC MVP。</text>
    <rect x="24" y="149" width="320" height="10" rx="5" class="bar-bg"/>
    <rect x="24" y="149" width="1" height="10" rx="5" class="defer"/>
    <text x="366" y="159" class="spec-count">0 / 15</text>
    <text x="24" y="174" class="spec-percent">0% - Later - 可选后置</text>
  </g>

  <g transform="translate(1070 760)">
    <rect class="card" width="470" height="184" rx="20"/>
    <text x="24" y="42" class="section-title">MVP 验收线</text>
    <text x="24" y="78" class="spec-desc">1. shared/auth.ts、CurrentUser、req.user 合同已固定。</text>
    <text x="24" y="103" class="spec-desc">2. Redis 关闭或不可用时，登录和项目隔离仍可用。</text>
    <text x="24" y="128" class="spec-desc">3. 普通用户只看到自己的项目，越权项目返回 404。</text>
    <text x="24" y="153" class="spec-desc">4. 管理员通过 /admin 和 /api/admin/* 查看全局只读状态。</text>
  </g>

  <g transform="translate(60 985)">
