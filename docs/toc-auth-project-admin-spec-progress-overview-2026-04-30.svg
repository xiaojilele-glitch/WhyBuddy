    <rect x="24" y="149" width="320" height="10" rx="5" class="bar-bg"/>
    <rect x="24" y="149" width="320" height="10" rx="5" class="done"/>
    <text x="366" y="159" class="spec-count">15 / 15</text>
    <text x="24" y="174" class="spec-percent">100% - MVP Wave 2 - 项目 owner 隔离已完成</text>
  </g>

  <g transform="translate(60 760)">
    <rect class="card" width="470" height="184" rx="20"/>
    <rect x="24" y="24" width="86" height="28" rx="14" class="progress"/>
    <text x="43" y="43" class="pill-text">进行中</text>
    <text x="132" y="44" class="spec-title">3. Admin Console Gate</text>
    <text x="24" y="72" class="spec-path">admin-console-and-global-role-gate</text>
    <text x="24" y="101" class="spec-desc">/admin 后台、requireAdmin、用户/项目/运行/异常只读视图。</text>
