  <!-- Architecture Comparison -->
  <rect x="20" y="970" width="1160" height="36" fill="#1e293b" rx="4"/>
  <text x="40" y="994" fill="#818cf8" font-size="13" font-weight="600">🏗️ 架构对比：whybuddy vs rbac-system-pc</text>

  <rect x="20" y="1010" width="570" height="200" fill="#0f172a" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="40" y="1035" fill="#10b981" font-size="12" font-weight="600">whybuddy（Runtime-first）</text>
  <text x="40" y="1060" fill="#94a3b8" font-size="11">✅ Wait/Resume HITL（mcp/transaction_flow/selection）</text>
  <text x="40" y="1080" fill="#94a3b8" font-size="11">✅ Replay/Audit observability（每个节点）</text>
  <text x="40" y="1100" fill="#94a3b8" font-size="11">✅ Loop guard（maxIterations 强制终止）</text>
  <text x="40" y="1120" fill="#94a3b8" font-size="11">✅ Mock-first DI（graceful degradation）</text>
  <text x="40" y="1140" fill="#94a3b8" font-size="11">✅ AgentLoopStateMachine（ReAct + 3 budgets）</text>
  <text x="40" y="1160" fill="#94a3b8" font-size="11">✅ Docker real/native/mock 三模式执行</text>
  <text x="40" y="1180" fill="#94a3b8" font-size="11">✅ 12 家族事件总线 + Socket.IO relay</text>
  <text x="40" y="1200" fill="#64748b" font-size="11">❌ 无可视化编排设计器（by design）</text>

  <rect x="610" y="1010" width="570" height="200" fill="#0f172a" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="630" y="1035" fill="#f59e0b" font-size="12" font-weight="600">rbac-system-pc（Enterprise SaaS）</text>
  <text x="630" y="1060" fill="#94a3b8" font-size="11">✅ 可视化 reactflow 编排画布</text>
  <text x="630" y="1080" fill="#94a3b8" font-size="11">✅ 21 个共享 UI 组件（NodeConfigPanel 等）</text>
  <text x="630" y="1100" fill="#94a3b8" font-size="11">✅ MySQL + Sequelize + 多租户隔离</text>
  <text x="630" y="1120" fill="#94a3b8" font-size="11">✅ LangChain.js + Qdrant + Neo4j</text>
  <text x="630" y="1140" fill="#94a3b8" font-size="11">✅ Bull 队列异步处理</text>
  <text x="630" y="1160" fill="#64748b" font-size="11">❌ 无 Wait/Resume HITL</text>
  <text x="630" y="1180" fill="#64748b" font-size="11">❌ 无 Replay/Audit observability</text>
  <text x="630" y="1200" fill="#64748b" font-size="11">❌ audio/ocr 是 placeholder（返回固定文本）</text>

  <!-- Footer -->
