<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="1440" viewBox="0 0 1840 1440" role="img" aria-labelledby="title desc">
  <title id="title">/autopilot 目标体验架构图 v4</title>
  <desc id="desc">展示 SPEC-first 自动驾驶闭环、策略化澄清、Route Orchestrator、伴随式 Agent Crew 横向层、核心资产层、体验投影层和统一事件流的目标架构。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="48%" stop-color="#eef7f4"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="crewGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="assetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="projectionGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="eventGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="darkBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d97706"/>
    </marker>
    <style>
      .title { font: 900 36px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 700 16px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .kicker { font: 900 12px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #64748b; letter-spacing: 1px; }
      .section-title { font: 900 22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #0f172a; }
      .label { font: 900 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #0f172a; }
      .body { font: 700 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #334155; }
      .small { font: 700 12px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475569; }
      .mono { font: 800 12px Consolas, "Microsoft YaHei", monospace; fill: #0f172a; }
      .card { rx: 18; filter: url(#shadow); }
      .mini { rx: 14; }
      .line { stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 9; }
      .pill { font: 900 11px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1840" height="1440" fill="url(#bg)"/>

  <g transform="translate(64 48)">
    <text class="title" x="0" y="0">/autopilot 目标体验架构图</text>
    <text class="subtitle" x="0" y="36">从“看 AI 怎么执行”升级为“让 AI 先推演未来，再决定怎么执行”，由策略化澄清、路线编排和 Agent Crew 横向层共同驱动。</text>
    <text class="mono" x="0" y="68">核心资产层：RouteSet / SPEC Tree / SpecDocument / PromptPackage / Runtime Event Stream / Artifact Replay；体验投影层：3D / HUD / Logs / Browser Preview / Replay Viewer</text>
  </g>

  <!-- Summary band -->
  <g transform="translate(64 132)">
    <rect class="card" width="1712" height="122" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text class="kicker" x="26" y="34">架构分层</text>
    <text class="section-title" x="26" y="66">核心资产层、横向角色层、体验投影层，三层分工清晰但通过统一事件流联动</text>

    <g transform="translate(26 80)">
      <rect width="220" height="24" rx="12" fill="#dcfce7" stroke="#86efac"/>
      <text class="pill" x="16" y="16" fill="#166534">核心资产层</text>
      <rect x="236" width="220" height="24" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
      <text class="pill" x="250" y="16" fill="#1d4ed8">横向角色层</text>
      <rect x="472" width="220" height="24" rx="12" fill="#ffedd5" stroke="#fdba74"/>
      <text class="pill" x="488" y="16" fill="#9a3412">体验投影层</text>
      <rect x="708" width="220" height="24" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
      <text class="pill" x="724" y="16" fill="#6d28d9">统一事件流</text>
    </g>

    <text class="small" x="980" y="86">即使 3D / HUD 暂时不可用，RouteSet、SPEC Tree、文档、提示词和回放仍必须可独立完成。</text>
  </g>

  <!-- Agent Crew fabric band -->
  <g transform="translate(64 278)">
    <rect class="card" width="1712" height="168" rx="28" fill="url(#crewGrad)" stroke="#93c5fd" stroke-width="2"/>
    <text class="kicker" x="28" y="36">横向贯穿层</text>
    <text class="section-title" x="28" y="68">Agent Crew Fabric</text>
    <text class="small" x="28" y="96">横向贯穿核心资产层与体验投影层：角色目录 + 角色能力矩阵 + 阶段激活策略 + role / crew / capability 事件 + RoleTimeline</text>
    <text class="small" x="28" y="120">角色不是节点编号，AIGC 节点是角色的能力，角色才是用户感知到的执行主体。</text>

    <g transform="translate(620 28)">
      <rect width="156" height="96" rx="16" fill="#ffffff" stroke="#bfdbfe"/>
      <text class="label" x="16" y="28">决策</text>
      <text class="small" x="16" y="50">目标 / 风险</text>
      <text class="small" x="16" y="70">成本 / 仲裁</text>
    </g>
    <g transform="translate(792 28)">
      <rect width="156" height="96" rx="16" fill="#ffffff" stroke="#bfdbfe"/>
      <text class="label" x="16" y="28">规划</text>
      <text class="small" x="16" y="50">澄清 / RouteSet</text>
      <text class="small" x="16" y="70">SPEC 树 / 里程碑</text>
    </g>
    <g transform="translate(964 28)">
      <rect width="156" height="96" rx="16" fill="#ffffff" stroke="#bfdbfe"/>
      <text class="label" x="16" y="28">执行</text>
      <text class="small" x="16" y="50">Docker / MCP</text>
      <text class="small" x="16" y="70">Skills / AIGC Node</text>
    </g>
    <g transform="translate(1136 28)">
      <rect width="156" height="96" rx="16" fill="#ffffff" stroke="#bfdbfe"/>
      <text class="label" x="16" y="28">审计</text>
      <text class="small" x="16" y="50">一致性 / 风险</text>
      <text class="small" x="16" y="70">可执行性 / 证据</text>
    </g>
    <g transform="translate(1308 28)">
      <rect width="156" height="96" rx="16" fill="#ffffff" stroke="#bfdbfe"/>
      <text class="label" x="16" y="28">表现</text>
      <text class="small" x="16" y="50">3D / HUD / 日志</text>
      <text class="small" x="16" y="70">浏览器 / 预演</text>
    </g>
    <g transform="translate(1480 28)">
      <rect width="156" height="96" rx="16" fill="#ffffff" stroke="#bfdbfe"/>
      <text class="label" x="16" y="28">记忆</text>
      <text class="small" x="16" y="50">Replay / Provenance</text>
      <text class="small" x="16" y="70">Artifact Memory</text>
    </g>

    <text class="mono" x="28" y="154">Role -> Capability -> Node -> Event -> Asset</text>
  </g>

  <!-- Main flow columns -->
  <g transform="translate(64 470)">
    <rect class="card" width="330" height="510" rx="26" fill="url(#inputGrad)" stroke="#93c5fd" stroke-width="2"/>
    <text class="kicker" x="22" y="34">Step 1</text>
    <text class="section-title" x="22" y="64">输入与结构化澄清</text>
    <text class="small" x="22" y="92">输入目标或 GitHub</text>
    <text class="small" x="22" y="112">先选澄清策略，再问问题</text>

    <g transform="translate(18 144)">
      <rect width="294" height="78" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
      <text class="label" x="14" y="26">目标 / GitHub 输入</text>
      <text class="small" x="14" y="48">文本、仓库、历史上下文</text>
      <text class="small" x="14" y="66">保留 provenance</text>
    </g>
    <g transform="translate(18 236)">
      <rect width="294" height="110" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
      <text class="label" x="14" y="26">澄清策略选择器</text>
      <text class="small" x="14" y="50">目标优先 / 仓库优先</text>
      <text class="small" x="14" y="70">风险优先 / 文档优先</text>
      <text class="small" x="14" y="90">预演优先 / 快速执行</text>
    </g>
    <g transform="translate(18 360)">
      <rect width="294" height="122" rx="14" fill="#dbeafe" stroke="#60a5fa"/>
      <text class="label" x="14" y="26">澄清问题集</text>
      <text class="small" x="14" y="50">来源、约束、用户、范围</text>
      <text class="small" x="14" y="70">答案状态、跳过、默认值</text>
      <text class="small" x="14" y="90">输出 readiness signal</text>
      <text class="small" x="14" y="110">形成 DrivingGoalPackage</text>
    </g>
  </g>

  <path class="line" d="M394 725 C418 725 418 725 440 725" stroke="#2563eb" marker-end="url(#arrowBlue)"/>

  <g transform="translate(440 470)">
    <rect class="card" width="500" height="510" rx="26" fill="url(#assetGrad)" stroke="#5eead4" stroke-width="2"/>
    <text class="kicker" x="22" y="34">Step 2</text>
    <text class="section-title" x="22" y="64">路线编排 + Agent Crew + Runtime Bridge</text>
    <text class="small" x="22" y="92">Route Orchestrator 接住澄清策略并生成沙盒推导作业</text>
    <text class="small" x="22" y="112">能力执行走 Docker / MCP / Skills，状态写回事件流</text>

    <g transform="translate(18 144)">
      <rect width="214" height="88" rx="14" fill="#ffffff" stroke="#99f6e4"/>
      <text class="label" x="14" y="26">Agent Crew</text>
      <text class="small" x="14" y="50">决策 / 规划 / 审计</text>
      <text class="small" x="14" y="70">表现 / 记忆</text>
    </g>
    <g transform="translate(248 144)">
      <rect width="234" height="88" rx="14" fill="#ffffff" stroke="#99f6e4"/>
      <text class="label" x="14" y="26">能力池 / 沙盒作业</text>
      <text class="small" x="14" y="50">Docker / MCP / Skills</text>
      <text class="small" x="14" y="70">AIGC Node / GitHub</text>
    </g>

    <g transform="translate(18 248)">
      <rect width="464" height="118" rx="14" fill="#ffffff" stroke="#99f6e4"/>
      <text class="label" x="14" y="26">角色状态</text>
      <text class="small" x="14" y="50">active / watching / reviewing / sleeping</text>
      <text class="small" x="14" y="72">stage activation policy</text>
      <text class="small" x="14" y="94">RoleTimeline / CapabilityBinding</text>
    </g>

    <g transform="translate(18 382)">
      <rect width="464" height="96" rx="14" fill="#ccfbf1" stroke="#14b8a6"/>
      <text class="label" x="14" y="26">沙盒推导产物</text>
      <text class="small" x="14" y="50">阶段大纲、主路径、次路径</text>
      <text class="small" x="14" y="70">风险、成本、复杂度评估</text>
    </g>
  </g>

  <path class="line" d="M940 725 C964 725 964 725 986 725" stroke="#0f766e" marker-end="url(#arrowTeal)"/>

  <g transform="translate(986 470)">
    <rect class="card" width="414" height="510" rx="26" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
    <text class="kicker" x="22" y="34">Step 3</text>
    <text class="section-title" x="22" y="64">核心资产链</text>
    <text class="small" x="22" y="92">RouteSet 不是答案终点，而是 SPEC Tree 的来源</text>
    <text class="small" x="22" y="112">reviewing 是明确交接态，不是后台卡死</text>

    <g transform="translate(18 136)">
      <rect width="378" height="58" rx="14" fill="#ffffff" stroke="#ddd6fe"/>
      <text class="label" x="14" y="28">RouteSet</text>
      <text class="small" x="14" y="50">主路径 / 次路径 / 选择理由</text>
    </g>
    <g transform="translate(18 204)">
      <rect width="378" height="66" rx="14" fill="#ffffff" stroke="#ddd6fe"/>
      <text class="label" x="14" y="28">SPEC Tree</text>
      <text class="small" x="14" y="50">可编辑 / 可版本化 / 长期沉淀</text>
    </g>
    <g transform="translate(18 280)">
      <rect width="378" height="58" rx="14" fill="#ffffff" stroke="#ddd6fe"/>
      <text class="label" x="14" y="28">SpecDocument</text>
      <text class="small" x="14" y="50">requirements / design / tasks</text>
    </g>
    <g transform="translate(18 348)">
      <rect width="378" height="58" rx="14" fill="#ffffff" stroke="#ddd6fe"/>
      <text class="label" x="14" y="28">PromptPackage / Handoff</text>
      <text class="small" x="14" y="50">implementation prompt / engineering plan</text>
    </g>
    <g transform="translate(18 416)">
      <rect width="378" height="74" rx="14" fill="#ede9fe" stroke="#a78bfa"/>
      <text class="label" x="14" y="28">Runtime Event Stream / Artifact Replay</text>
      <text class="small" x="14" y="50">route.* / spec.* / prompt.* / evidence.*</text>
      <text class="small" x="14" y="66">version / provenance / decisions</text>
    </g>
  </g>

  <!-- Projection layer -->
  <g transform="translate(1422 470)">
    <rect class="card" width="354" height="510" rx="26" fill="url(#projectionGrad)" stroke="#fdba74" stroke-width="2"/>
    <text class="kicker" x="22" y="34">体验投影层</text>
    <text class="section-title" x="22" y="64">3D / HUD / Logs</text>
    <text class="small" x="22" y="92">Browser Preview / Replay Viewer</text>
    <text class="small" x="22" y="112">只消费事件和资产，不保存业务真相</text>

    <g transform="translate(18 144)">
      <rect width="318" height="76" rx="14" fill="#ffffff" stroke="#fdba74"/>
      <text class="label" x="14" y="28">3D Scene</text>
      <text class="small" x="14" y="50">角色动作、场景状态、接管点</text>
    </g>
    <g transform="translate(18 232)">
      <rect width="318" height="76" rx="14" fill="#ffffff" stroke="#fdba74"/>
      <text class="label" x="14" y="28">HUD</text>
      <text class="small" x="14" y="50">阶段、风险、置信度、进度</text>
    </g>
    <g transform="translate(18 320)">
      <rect width="318" height="76" rx="14" fill="#ffffff" stroke="#fdba74"/>
      <text class="label" x="14" y="28">Logs / Browser Preview</text>
      <text class="small" x="14" y="50">执行日志、证据、预览</text>
    </g>
    <g transform="translate(18 408)">
      <rect width="318" height="76" rx="14" fill="#fff7ed" stroke="#fb923c"/>
      <text class="label" x="14" y="28">Replay Viewer</text>
      <text class="small" x="14" y="50">消费资产回放，不保存业务真相</text>
    </g>
  </g>

  <!-- Event stream -->
  <g transform="translate(64 1030)">
    <rect class="card" width="1712" height="158" rx="28" fill="url(#eventGrad)" stroke="#a78bfa" stroke-width="2"/>
    <text class="kicker" x="28" y="38">统一事件流</text>
    <text class="section-title" x="28" y="70">Autopilot Runtime Event Stream</text>
    <text class="small" x="28" y="96">clarification.* / sandbox.* / crew.* / role.* / capability.*</text>
    <text class="small" x="28" y="118">route.* / spec.* / preview.* / prompt.* / mission.* / evidence.*</text>
    <text class="small" x="28" y="142">scene.* / hud.* / browser.* 统一驱动运行台、资产回放和用户交接。</text>

    <g transform="translate(1160 24)">
      <rect width="212" height="88" rx="16" fill="#ffffff" stroke="#c4b5fd"/>
      <text class="label" x="14" y="28">Asset Memory</text>
      <text class="small" x="14" y="52">Artifact Replay / Provenance</text>
      <text class="small" x="14" y="70">version / evidence / decisions</text>
    </g>
    <g transform="translate(1388 24)">
      <rect width="296" height="88" rx="16" fill="#ffffff" stroke="#c4b5fd"/>
      <text class="label" x="14" y="28">Core Asset Guarantees</text>
      <text class="small" x="14" y="52">RouteSet / SPEC Tree / Docs / Prompt</text>
      <text class="small" x="14" y="70">Event Stream / Artifact Replay / Provenance</text>
    </g>
  </g>

  <!-- Connecting lines -->
  <path class="line" d="M1150 446 C1150 470 1150 470 1150 470" stroke="#0f766e" marker-end="url(#arrowTeal)"/>
  <path class="line" d="M1580 446 C1580 470 1580 470 1580 470" stroke="#d97706" marker-end="url(#arrowAmber)"/>
  <path class="line dash" d="M1580 980 C1580 1008 1580 1008 1580 1030" stroke="#7c3aed" marker-end="url(#arrowTeal)"/>
  <path class="line dash" d="M736 980 C736 1010 736 1010 736 1030" stroke="#7c3aed" marker-end="url(#arrowTeal)"/>
  <path class="line dash" d="M1150 980 C1150 1008 1150 1008 1150 1030" stroke="#7c3aed" marker-end="url(#arrowTeal)"/>

  <!-- Footer -->
  <g transform="translate(64 1224)">
    <rect class="card" width="1712" height="112" rx="24" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
    <text class="kicker" x="28" y="36" fill="#94a3b8">最终体验</text>
    <text class="body" x="28" y="68" fill="#e2e8f0">用户输入一个想法或 GitHub 仓库后，系统先策略化澄清，再由 Route Orchestrator 和伴随式 Agent Crew 组织多角色推演，沉淀 RouteSet 和 SPEC Tree，随后生成文档、预演和提示词，最后接回工程落地与回放。</text>
    <text class="small" x="28" y="92" fill="#cbd5e1">这不是一个单点执行面板，而是一套从想法到资产、从资产到执行、从执行到回流的 SPEC-first 项目自动驾驶闭环。</text>
  </g>
</svg>
