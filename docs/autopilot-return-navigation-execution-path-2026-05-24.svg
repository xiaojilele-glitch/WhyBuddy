<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2300" viewBox="0 0 1600 2300" role="img" aria-labelledby="title desc">
  <title id="title">Autopilot 返回导航修复详细操作记录 - 2026-05-24</title>
  <desc id="desc">记录 Codex 本轮对 Autopilot 返回导航问题的实际开发、测试与浏览器验证路径，包含命令、结果、判断和落点。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; filter: url(#shadow); }
      .band { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1; }
      .red { fill: #fff1f2; stroke: #fda4af; stroke-width: 1; }
      .green { fill: #ecfdf5; stroke: #86efac; stroke-width: 1; }
      .amber { fill: #fffbeb; stroke: #fcd34d; stroke-width: 1; }
      .violet { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 1; }
      .gray { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
