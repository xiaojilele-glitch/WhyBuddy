      .body { fill: #334155; font: 500 14px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .small { fill: #64748b; font: 500 12px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
      .mono { fill: #334155; font: 600 12px Consolas, "Segoe UI Mono", monospace; }
